<!-- PART 2: UTIL + STORE + AUDIO + 50 ACHIEVEMENTS -->
<script>
/* === UTIL === */

const rand=(a,b)=>Math.random()*(b-a)+a;
const ri=(a,b)=>Math.floor(rand(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const fmt=n=>(n||0).toLocaleString('en-US');
const uid=()=>Math.random().toString(36).slice(2,10);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* === STORE === */

equippedMusic:'silence',

load(){try{const r=localStorage.getItem(this.key);this.d=r?{...this.def(),...JSON.parse(r)}:this.def();}catch(e){this.d=this.def();}return this.d;},
save(){try{localStorage.setItem(this.key,JSON.stringify(this.d));}catch(e){Toast.show('❌ Save failed');}},
reset(){if(!confirm('Reset all data? Cannot undo!'))return;localStorage.removeItem(this.key);this.d=this.def();this.save();location.reload();},
export(){const b=new Blob([JSON.stringify(this.d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='blockverse_'+Date.now()+'.json';a.click();Toast.show('💾 Saved!');},
import(){const i=document.createElement('input');i.type='file';i.accept='application/json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{this.d={...this.def(),...JSON.parse(ev.target.result)};this.save();Toast.show('✅ Imported!','ok');UI.show('home');}catch(err){Toast.show('❌ Invalid file','err');}};r.readAsText(f);};i.click();},
autoSave(){this.save();}
};

/* === AUDIO === */
const Audio={
ctx:null,init(){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}},
beep(freq=440,dur=0.1,vol=0.2,type='sine'){
if(!Store.d.soundEnabled)return;
try{if(!this.ctx)this.init();if(!this.ctx)return;
const o=this.ctx.createOscillator(),g=this.ctx.createGain();
o.type=type;o.frequency.value=freq;g.gain.value=vol*Store.d.volume;
o.connect(g);g.connect(this.ctx.destination);o.start();
g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
o.stop(this.ctx.currentTime+dur);}catch(e){}},
click(){this.beep(800,0.05,0.15,'square');},
success(){this.beep(523,0.1);setTimeout(()=>this.beep(659,0.1),100);setTimeout(()=>this.beep(784,0.15),200);},
fail(){this.beep(220,0.2,0.3,'sawtooth');},
coin(){this.beep(1200,0.05);setTimeout(()=>this.beep(1500,0.05),50);},
levelup(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.beep(f,0.15),i*100));},
explosion(){this.beep(80,0.4,0.4,'sawtooth');},
combo(){this.beep(880+Store.d.stats.combos*50,0.08);}
};

/* === TOAST === */
const Toast={show(t,type=''){const z=document.getElementById('toast-zone');
const e=document.createElement('div');e.className='toast '+type;e.textContent=t;
z.appendChild(e);setTimeout(()=>e.remove(),2400);}};

/* === FLOATING TEXT === */
const Float={show(x,y,text,color='#00ff88'){const e=document.createElement('div');e.className='float';e.textContent=text;e.style.left=x+'px';e.style.top=y+'px';e.style.color=color;document.body.appendChild(e);setTimeout(()=>e.remove(),1500);}};

/* === CONFETTI === */
const Confetti={burst(x,y,n=30){for(let i=0;i<n;i++){const e=document.createElement('div');e.className='confetti';
const c=pick(['#ff007a','#00f0ff','#ffe600','#00ff88','#b400ff']);
e.style.background=c;e.style.left=(x+ri(-30,30))+'px';e.style.top=y+'px';
e.style.animationDuration=(ri(15,30)/10)+'s';
e.style.transform='rotate('+ri(0,360)+'deg)';
document.body.appendChild(e);setTimeout(()=>e.remove(),2500);}}};
