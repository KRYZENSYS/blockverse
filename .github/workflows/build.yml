name: Build Blockverse
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Combine parts into index.html
        run: |
          echo 'Building BLOCKVERSE...' > build.log
          cat part1.html part2.html part3.html part4.html part5.html > index.html
          wc -l index.html >> build.log
          ls -la >> build.log
      - name: Commit index.html
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html build.log
          git commit -m "Build: combine 5 parts into index.html" || echo "Nothing to commit"
          git push