<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,user-scalable=0"><meta name="theme-color" content="#0a0014"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><title>BLOCKVERSE V3.0 ULTIMATE</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{--bg:#050018;--bg2:#0a0028;--bg3:#140030;--panel:rgba(20,5,40,.55);--glass:rgba(255,255,255,.04);--border:rgba(180,80,255,.25);--b2:rgba(180,80,255,.45);--neon:#b400ff;--n2:#00f0ff;--n3:#ff007a;--n4:#ffe600;--ok:#00ff88;--warn:#ff8800;--bad:#ff0044;--txt:#e8e6ff;--mut:#8a82b8;--tr:.25s}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Segoe UI',-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.4}
body{background:radial-gradient(ellipse at 15% 8%,rgba(60,0,140,.6) 0%,transparent 45%),radial-gradient(ellipse at 85% 85%,rgba(140,0,60,.5) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(0,80,140,.3) 0%,transparent 60%),var(--bg);position:relative}
canvas.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.6}
.app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#loading.hide{opacity:0;pointer-events:none}
.loader{width:130px;height:130px;border:4px solid var(--border);border-top-color:var(--neon);border-right-color:var(--n2);border-radius:50%;animation:spin 1.1s linear infinite;box-shadow:0 0 50px var(--neon)}
.loader::after{content:'';position:absolute;inset:14px;border:3px solid var(--border);border-bottom-color:var(--n3);border-radius:50%;animation:spin .8s linear reverse infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltitle{font-size:36px;font-weight:900;letter-spacing:6px;margin-top:25px;background:linear-gradient(90deg,var(--n2),var(--neon),var(--n3),var(--n2));background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 3s linear infinite,glow 2s ease-in-out infinite}
@keyframes shine{to{background-position:200% 0}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 10px var(--neon))}50%{filter:drop-shadow(0 0 28px var(--n2))}}
.lsub{color:var(--mut);margin-top:10px;font-size:12px;letter-spacing:4px}
.lbar{width:200px;height:4px;background:var(--glass);border-radius:2px;margin-top:28px;overflow:hidden}
.lbar .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--n2),var(--neon));animation:load 2.4s ease forwards}
@keyframes load{to{width:100%}}
.top{height:58px;display:flex;align-items:center;padding:0 14px;background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.logo{font-size:17px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,var(--n2),var(--neon));-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer;transition:transform .2s}
.logo:hover{transform:scale(1.05)}
.cur{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap}
.cur .c{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--glass);border:1px solid var(--border);border-radius:18px;font-size:12px;font-weight:700;transition:all .2s}
.cur .c:hover{border-color:var(--n2);box-shadow:0 0 10px rgba(0,240,255,.3)}
.cur .c .ic{font-size:13px}
.main{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;padding:14px;animation:fadein .4s;-webkit-overflow-scrolling:touch}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.hide{display:none!important}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:11px;margin-top:12px}
.tile{background:var(--panel);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid var(--border);border-radius:13px;padding:14px 9px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.tile:hover{transform:translateY(-4px) scale(1.03);border-color:var(--neon);box-shadow:0 8px 30px rgba(180,0,255,.45)}
.tile:active{transform:scale(.95)}
.tile .em{font-size:38px;display:block;margin-bottom:5px;filter:drop-shadow(0 0 8px var(--neon));transition:transform .3s}
.tile:hover .em{transform:scale(1.15) rotate(-5deg)}
.tile .nm{font-weight:800;font-size:12px}
.tile .ds{color:var(--mut);font-size:10px;margin-top:2px}
.tile.lk{opacity:.4;pointer-events:none;filter:grayscale(.8)}
.panel{background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:11px;position:relative;overflow:hidden}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.btn{padding:9px 16px;background:linear-gradient(135deg,var(--neon),#7a00cc);color:#fff;border:none;border-radius:9px;font-weight:800;cursor:pointer;font-size:13px;transition:all .25s;box-shadow:0 4px 14px rgba(180,0,255,.4);letter-spacing:.3px}
.btn:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(180,0,255,.6)}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.s{background:var(--glass);box-shadow:none;border:1px solid var(--border);color:var(--txt)}
.btn.d{background:linear-gradient(135deg,#ff0044,#cc0033);box-shadow:0 4px 14px rgba(255,0,68,.4)}
.btn.ok{background:linear-gradient(135deg,#00ff88,#00aa55);box-shadow:0 4px 14px rgba(0,255,136,.4);color:#000}
.btn.warn{background:linear-gradient(135deg,#ff8800,#cc6600);box-shadow:0 4px 14px rgba(255,136,0,.4)}
.btn.sm{padding:6px 11px;font-size:11px}
.btn.full{width:100%}
.hud{display:flex;justify-content:space-around;padding:7px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;flex-wrap:wrap;gap:5px;backdrop-filter:blur(15px)}
.hud .h{text-align:center;min-width:55px}
.hud .v{font-size:18px;font-weight:900;color:var(--n2);text-shadow:0 0 8px currentColor}
.hud .l{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
.gwrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0}
canvas.g{background:#000;border:2px solid var(--border);border-radius:10px;box-shadow:0 0 30px rgba(180,0,255,.35);max-width:100%;touch-action:none;display:block}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;animation:fadein .3s}
.modal.hide{display:none}
.mbox{background:var(--bg2);border:2px solid var(--neon);border-radius:15px;padding:20px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 0 55px var(--neon);position:relative}
.mbox h3{margin-bottom:13px;font-size:21px;color:var(--n2);text-shadow:0 0 10px currentColor}
.mbox .x{position:absolute;top:10px;right:14px;font-size:22px;cursor:pointer;color:var(--mut)}
.mbox .x:hover{color:var(--neon)}
.ach{background:var(--glass);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:all .3s}
.ach.done{border-color:var(--ok);background:rgba(0,255,136,.08);box-shadow:0 0 12px rgba(0,255,136,.2)}
.ach .ic{font-size:30px;min-width:40px;text-align:center;filter:drop-shadow(0 0 6px var(--neon))}
.ach .ic.lk{opacity:.3;filter:grayscale(1)}
.ach .info{flex:1;min-width:0}
.ach .ti{font-weight:800;font-size:13px}
.ach .de{color:var(--mut);font-size:11px;line-height:1.3}
.ach .rw{color:var(--ok);font-size:10px;font-weight:700;margin-top:2px}
.bar{height:8px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar .fill{height:100%;background:linear-gradient(90deg,var(--n2),var(--neon));transition:width .5s;box-shadow:0 0 8px var(--neon)}
.tabs{display:flex;gap:3px;margin-bottom:11px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:9px 13px;background:none;border:none;color:var(--mut);cursor:pointer;font-weight:700;font-size:12px;white-space:nowrap;border-bottom:2px solid transparent}
.tab.on{color:var(--n2);border-bottom-color:var(--n2)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.toast{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--neon);padding:10px 18px;border-radius:10px;z-index:200;box-shadow:0 0 22px var(--neon);animation:slidein .4s;font-weight:700;font-size:13px;max-width:90%;text-align:center}
.toast.err{border-color:var(--bad);box-shadow:0 0 22px var(--bad)}
.toast.ok{border-color:var(--ok);box-shadow:0 0 22px var(--ok)}
@keyframes slidein{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
.float{position:fixed;pointer-events:none;font-weight:900;font-size:18px;z-index:150;animation:floatup 1.4s forwards;text-shadow:0 0 8px currentColor}
@keyframes floatup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-75px)}}
.energy{height:6px;background:rgba(0,0,0,.4);border-radius:3px;margin-top:4px;overflow:hidden;border:1px solid var(--border)}
.energy .fill{height:100%;background:linear-gradient(90deg,#ff8800,#ffe600);transition:width .3s;box-shadow:0 0 5px #ff8800}
input.txt{background:var(--glass);border:1px solid var(--border);color:var(--txt);padding:9px 12px;border-radius:8px;width:100%;font-size:14px}
input.txt:focus{outline:none;border-color:var(--neon);box-shadow:0 0 12px var(--neon)}
.vip{background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;padding:2px 8px;border-radius:9px;font-size:10px;font-weight:900;letter-spacing:1.2px;box-shadow:0 0 8px #ffd700}
.rk{font-weight:900;letter-spacing:1px;text-shadow:0 0 8px currentColor}
.rk-Bronze{color:#cd7f32}.rk-Silver{color:#e0e0e0}.rk-Gold{color:#ffd700}.rk-Platinum{color:#00ffff}.rk-Diamond{color:#b9f2ff;text-shadow:0 0 12px #00ffff}.rk-Master{color:#ff00ff}.rk-Grandmaster{color:#ff4500}.rk-Legend{color:#ff1493;text-shadow:0 0 14px #ff1493}.rk-Immortal{background:linear-gradient(90deg,red,yellow,lime,cyan,blue,magenta);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rw 2s linear infinite}
@keyframes rw{to{background-position:200% 0}}
#fps{position:fixed;top:65px;right:10px;background:rgba(0,0,0,.7);padding:4px 8px;border-radius:6px;font-size:10px;color:var(--ok);z-index:50;font-family:monospace;border:1px solid var(--border)}
.confetti{position:fixed;width:8px;height:8px;pointer-events:none;z-index:300;animation:cft 2s linear forwards}
@keyframes cft{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media (max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px}.tile .em{font-size:30px}.tile .nm{font-size:11px}.logo{font-size:14px}.top{height:55px;padding:0 10px}.cur .c{padding:4px 8px;font-size:11px}}
.snow{position:fixed;top:-20px;color:#fff;pointer-events:none;z-index:50;font-size:14px;animation:snowfall 8s linear infinite}
@keyframes snowfall{to{transform:translateY(105vh) rotate(360deg);opacity:0}}
.bp-fill{height:100%;background:linear-gradient(90deg,#00ff88,#ffe600,#ff007a,#00f0ff);background-size:200% 100%;animation:bpf 2s linear infinite}
@keyframes bpf{to{background-position:-200% 0}}
.lava{background:linear-gradient(180deg,#ff4500,#ffd700,#ff4500);background-size:100% 200%;animation:lv 3s linear infinite}
@keyframes lv{to{background-position:0 -200%}}
</style></head><body>
<canvas class="bg" id="bgCanvas"></canvas><div id="fps" style="display:none">60 FPS</div>
<div id="loading"><div class="loader"></div><div class="ltitle">BLOCKVERSE</div><div class="lsub">V 3.0 ULTIMATE</div><div class="lbar"><div class="fill"></div></div></div>
<div class="app"><div class="top">
<div class="logo" onclick="UI.show('home')">BLOCKVERSE</div>
<div class="cur">
<div class="c"><span class="ic"></span><span id="coins">0</span></div>
<div class="c"><span class="ic"></span><span id="diamonds">0</span></div>
<div class="c"><span class="ic"></span><span id="energy">100</span>/100</div>
<div class="c"><span class="ic"></span><span id="lvl">1</span></div>
</div></div>
<div class="main" id="main"></div></div>
<div id="modal" class="modal hide"><div class="mbox" id="mbox"></div></div>
<div id="toast-zone"></div>
<script>
