<!-- PART 1: HEAD + CSS -->
<style>
:root{--bg:#050018;--bg2:#0a0028;--bg3:#140030;--neon:#b400ff;--n2:#00f0ff;--n3:#ff007a;--n4:#ffe600;--txt:#e0e0ff;--mut:#7070a0;--ok:#00ff88;--warn:#ff8800;--err:#ff0044;--glass:rgba(180,0,255,.08);--bord:rgba(180,0,255,.25)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);user-select:none;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit}
/* BG Canvas */#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
/* Loading */#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity .5s}#loading.hide{opacity:0;pointer-events:none}#loading .spin{width:60px;height:60px;border:4px solid var(--glass);border-top-color:var(--neon);border-radius:50%;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}#loading .txt{margin-top:18px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,var(--n2),var(--neon));-webkit-background-clip:text;background-clip:text;color:transparent;font-size:20px}
/* Top */.top{position:fixed;top:0;left:0;right:0;height:54px;background:linear-gradient(180deg,rgba(10,0,40,.95),rgba(10,0,40,.85));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:50;overflow:hidden}
.t-btn{display:flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--bord);border-radius:18px;padding:6px 10px;font-size:12px;font-weight:700;color:var(--txt);transition:all .2s}.t-btn:active{transform:scale(.92)}.t-btn.gold{color:var(--n4);border-color:rgba(255,230,0,.4)}.t-btn.dia{color:var(--n2);border-color:rgba(0,240,255,.4)}.t-btn.en{color:var(--ok);border-color:rgba(0,255,136,.4)}.t-btn.lvl{color:var(--neon);border-color:rgba(180,0,255,.4)}
/* Bottom */.bottom{position:fixed;bottom:0;left:0;right:0;height:60px;background:linear-gradient(0deg,rgba(10,0,40,.95),rgba(10,0,40,.7));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--bord);display:flex;align-items:center;justify-content:space-around;padding:0 4px;z-index:50}
.b-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;color:var(--mut);font-size:9px;font-weight:700;padding:6px 10px;border-radius:8px;transition:all .2s;flex:1;max-width:80px}.b-btn.on{color:var(--n2);background:rgba(0,240,255,.1)}.b-btn .em{font-size:18px}
/* Main */#main{position:absolute;top:54px;bottom:60px;left:0;right:0;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
.screen{padding-bottom:20px}
/* Panels */.panel{background:linear-gradient(135deg,rgba(20,0,40,.6),rgba(40,0,60,.4));border:1px solid var(--bord);border-radius:14px;padding:14px;margin-bottom:10px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.5}
/* Buttons */.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;background:var(--glass);border:1px solid var(--bord);border-radius:10px;color:var(--txt);font-size:13px;font-weight:700;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}.btn:active{transform:scale(.96)}.btn:hover{background:rgba(180,0,255,.15);border-color:var(--neon);box-shadow:0 0 12px rgba(180,0,255,.3)}.btn.ok{background:linear-gradient(135deg,#00cc66,#008844);border-color:var(--ok);color:#fff}.btn.warn{background:linear-gradient(135deg,#ff8800,#cc5500);border-color:var(--warn);color:#fff}.btn.d{background:linear-gradient(135deg,#aa0033,#660022);border-color:var(--err);color:#fff}.btn.full{width:100%}.btn.sm{padding:6px 10px;font-size:11px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
/* Inputs */.txt{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--bord);border-radius:8px;padding:10px;color:var(--txt);font-size:13px;min-width:0}.txt:focus{border-color:var(--n2);outline:none;box-shadow:0 0 8px rgba(0,240,255,.3)}
/* Grid */.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.tile{background:linear-gradient(135deg,rgba(20,0,40,.7),rgba(60,0,80,.4));border:1px solid var(--bord);border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}.tile:active{transform:scale(.95)}.tile:hover{transform:translateY(-2px);border-color:var(--n2);box-shadow:0 4px 16px rgba(0,240,255,.3)}.tile .em{font-size:32px;display:block;margin-bottom:6px;filter:drop-shadow(0 0 8px currentColor)}.tile .nm{font-size:11px;font-weight:800;color:var(--txt);margin-bottom:2px}.tile .ds{font-size:9px;color:var(--mut)}.tile.lk{opacity:.5;filter:grayscale(.5)}
/* Bar */.bar{height:8px;background:rgba(0,0,0,.5);border-radius:4px;overflow:hidden;border:1px solid var(--bord);margin:4px 0}.bar .fill{height:100%;background:linear-gradient(90deg,var(--n2),var(--neon));transition:width .4s;box-shadow:0 0 8px currentColor}
/* Energy */.energy{height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;border:1px solid var(--bord);margin:4px 0}.energy .fill{height:100%;background:linear-gradient(90deg,#00ff88,#88ff44);box-shadow:0 0 6px currentColor;transition:width .4s}
/* VIP */.vip{background:linear-gradient(90deg,#ffd700,#ff8800);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;animation:glow 2s ease-in-out infinite}@keyframes glow{50%{filter:brightness(1.5)}}
/* Rank */.rk{display:inline-block;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:900;color:#fff}.rk-Bronze{background:linear-gradient(135deg,#cd7f32,#8b4513)}.rk-Silver{background:linear-gradient(135deg,#c0c0c0,#808080)}.rk-Gold{background:linear-gradient(135deg,#ffd700,#ff8800)}.rk-Platinum{background:linear-gradient(135deg,#00ffff,#0088cc);color:#000}.rk-Diamond{background:linear-gradient(135deg,#b9f2ff,#00bfff);color:#000}.rk-Master{background:linear-gradient(135deg,#b400ff,#8000cc)}.rk-Grandmaster{background:linear-gradient(135deg,#ff0044,#ff8800)}.rk-Legend{background:linear-gradient(135deg,#ff0080,#00f0ff);animation:glow 2s infinite}.rk-Immortal{background:linear-gradient(90deg,#ff0044,#ffd700,#00f0ff,#ff0044);background-size:300% 100%;animation:immortal 3s linear infinite;color:#000}@keyframes immortal{to{background-position:300% 0}}
/* Tabs */.tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:10px;padding:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}.tab{flex:1;padding:8px 10px;font-size:11px;font-weight:800;color:var(--mut);text-align:center;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;min-width:60px}.tab.on{background:var(--neon);color:#fff;box-shadow:0 0 10px var(--neon)}
/* Achievement */.ach{display:flex;gap:10px;align-items:center;padding:8px;background:rgba(0,0,0,.3);border-radius:10px;margin-bottom:6px;border:1px solid transparent;transition:all .2s}.ach.done{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.05)}.ach .ic{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--glass);border-radius:10px;border:1px solid var(--bord);flex-shrink:0}.ach .ic.lk{filter:grayscale(1);opacity:.5}.ach .info{flex:1;min-width:0}.ach .ti{font-size:12px;font-weight:800;color:var(--txt)}.ach .de{font-size:10px;color:var(--mut);margin:2px 0}.ach .rw{font-size:10px;color:var(--ok);font-weight:700}
/* Game */.gwrap{display:flex;justify-content:center;padding:10px 0}.g{max-width:100%;height:auto;border:2px solid var(--neon);border-radius:10px;box-shadow:0 0 20px rgba(180,0,255,.4);background:#000}
.hud{display:flex;justify-content:space-around;gap:6px;margin-bottom:8px;flex-wrap:wrap}.h{flex:1;text-align:center;background:linear-gradient(135deg,rgba(20,0,40,.7),rgba(40,0,60,.5));border:1px solid var(--bord);border-radius:10px;padding:6px}.h .v{font-size:18px;font-weight:900;color:var(--n2);text-shadow:0 0 8px currentColor}.h .l{font-size:9px;color:var(--mut);text-transform:uppercase}
/* Modal */#modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}.modal.hide{display:none}#mbox{background:linear-gradient(135deg,#0a0028,#140040);border:1px solid var(--neon);border-radius:16px;padding:20px;max-width:340px;width:100%;position:relative;box-shadow:0 0 40px rgba(180,0,255,.5)}.x{position:absolute;top:10px;right:14px;font-size:20px;cursor:pointer;color:var(--mut);font-weight:900}
/* Toast */#toast-zone{position:fixed;top:64px;right:10px;z-index:200;pointer-events:none}.toast{background:linear-gradient(135deg,rgba(20,0,40,.95),rgba(40,0,60,.9));border:1px solid var(--neon);border-radius:10px;padding:10px 14px;color:var(--txt);font-size:13px;font-weight:700;margin-bottom:6px;animation:slideIn .3s,slideOut .3s 2.1s forwards;box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:260px}.toast.ok{border-color:var(--ok);box-shadow:0 0 16px rgba(0,255,136,.4)}.toast.err{border-color:var(--err);box-shadow:0 0 16px rgba(255,0,68,.4)}.toast.warn{border-color:var(--warn);box-shadow:0 0 16px rgba(255,136,0,.4)}@keyframes slideIn{from{transform:translateX(120%);opacity:0}}@keyframes slideOut{to{transform:translateX(120%);opacity:0}}
/* Float */.float{position:fixed;font-weight:900;font-size:18px;pointer-events:none;z-index:150;animation:floatUp 1.5s ease-out forwards;text-shadow:0 0 8px currentColor}@keyframes floatUp{to{transform:translateY(-80px);opacity:0}}
/* Confetti */.confetti{position:fixed;width:8px;height:8px;pointer-events:none;z-index:140;animation:confettiFall linear forwards}@keyframes confettiFall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
/* Snow */.snow{position:fixed;color:#fff;pointer-events:none;z-index:5;font-size:14px;animation:snowFall linear infinite}@keyframes snowFall{to{transform:translateY(100vh) translateX(50px)}}
/* BP fill */.bp-fill{height:100%;background:linear-gradient(90deg,#b400ff,#00f0ff,#ff007a);background-size:200% 100%;animation:bpFlow 3s linear infinite}
@keyframes bpFlow{to{background-position:200% 0}}
/* FPS */#fps{position:fixed;bottom:8px;left:8px;font-size:10px;color:var(--mut);background:rgba(0,0,0,.5);padding:2px 6px;border-radius:4px;z-index:30;display:none}
/* Shop */.shop-c{animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}}
@media(max-width:360px){.t-btn{padding:4px 6px;font-size:10px}.b-btn{font-size:8px;padding:4px 6px}.b-btn .em{font-size:16px}#main{padding:6px}}
@media(min-width:768px){#main{max-width:600px;left:50%;transform:translateX(-50%);border-left:1px solid var(--bord);border-right:1px solid var(--bord)}}
